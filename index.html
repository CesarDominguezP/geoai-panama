<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GeoAI - Panamá Oeste</title>

    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />

    <style>
        /* Hacemos que el mapa ocupe toda la pantalla */
        body {
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        #map {
            height: 100vh;
            width: 100%;
        }

        /* Un panel flotante para los resultados */
        .info-panel {
            position: absolute;
            top: 20px;
            right: 20px;
            z-index: 1000;
            background: white;
            padding: 15px;
            border-radius: 8px;
            box-shadow: 0 0 15px rgba(0, 0, 0, 0.2);
            max-width: 300px;
        }
    </style>
</head>

<body>

    <div class="info-panel">
        <h3>Explorador GeoAI</h3>
        <p id="status">Haz clic en el mapa para analizar el terreno en Panamá Oeste.</p>
        
    </div>

    <div id="map"></div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

    <script>
        // MANTENEMOS: La configuración del mapa
        const map = L.map('map').setView([8.6833, -79.9167], 13);

        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
            attribution: '© OpenStreetMap'
        }).addTo(map);

        // REEMPLAZAMOS: El evento de clic por la nueva versión conectada a Python
        map.on('click', function(e) {
            const lat = e.latlng.lat.toFixed(5);
            const lng = e.latlng.lng.toFixed(5);

            document.getElementById('status').innerText = "Solicitando blindaje digital...";

            // Llamada al servidor Python (El "Puente")
            fetch('http://127.0.0.1:5000/analizar', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ lat: lat, lng: lng })
            })
            .then(response => response.json())
            .then(data => {
                // Actualizamos el panel con la respuesta del servidor
                document.getElementById('status').innerHTML = `
                    <strong>Resultado:</strong> ${data.resultado}<br>
                    <strong>Firma SHA-256:</strong> <small style="word-break: break-all;">${data.hash}</small>
                `;
                
                L.marker([lat, lng]).addTo(map)
                    .bindPopup(`Integridad validada: ${data.hash.substring(0,10)}...`)
                    .openPopup();
            })
            .catch(err => {
                console.error('Error de conexión:', err);
                document.getElementById('status').innerText = "Error: ¿El servidor Python está encendido?";
            });
        });
    </script>
</body>

</html>
